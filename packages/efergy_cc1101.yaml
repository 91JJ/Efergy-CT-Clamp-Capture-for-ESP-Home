substitutions:
  device_name: efergy-sensor
  friendly_name: Efergy Energy Monitor
  board_type: esp32dev
 # wifi_ssid: ""
 # wifi_password: ""
 # fallback_ap_password: "change-this-fallback-password"
  mains_voltage: "230.0"
  preferred_tx_id: "auto"
  publish_raw_bytes: "false"
  pin_cc1101_sck: "14"
  pin_cc1101_mosi: "13"
  pin_cc1101_miso: "12"
  pin_cc1101_csn: "5"
  pin_cc1101_gdo0: "4"
  pin_cc1101_gdo2: "27"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: ${board_type}
  framework:
    type: arduino

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: ${device_name}-fallback
    password: ${fallback_ap_password}
  power_save_mode: none
  fast_connect: true

api:

ota:
  platform: esphome

captive_portal:

logger:
  level: INFO

spi:
  id: efergy_spi_bus
  clk_pin: ${pin_cc1101_sck}
  miso_pin: ${pin_cc1101_miso}
  mosi_pin: ${pin_cc1101_mosi}

efergy_cc1101:
  spi_id: efergy_spi_bus
  mains_voltage: ${mains_voltage}
  preferred_tx_id: "${preferred_tx_id}"
  publish_raw_bytes: ${publish_raw_bytes}
  cs_pin: ${pin_cc1101_csn}
  gdo0_pin: ${pin_cc1101_gdo0}
  gdo2_pin: ${pin_cc1101_gdo2}
  current:
    name: "${friendly_name} Current"
  power:
    name: "${friendly_name} Power Usage"
  interval:
    name: "${friendly_name} Interval"
  pairing:
    name: "${friendly_name} Pairing Mode"
  tx_id:
    name: "${friendly_name} TX ID"
  battery_state:
    name: "${friendly_name} Battery State"
  raw_bytes:
    name: "${friendly_name} Raw Bytes"
    disabled_by_default: true

sensor:
  - platform: copy
    source_id: efergy_power_w
    internal: true
    unit_of_measurement: "kW"
    accuracy_decimals: 4
    filters:
      - multiply: 0.001

  - platform: integration
    name: "${friendly_name} Energy Usage"
    sensor: efergy_power_kw
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    time_unit: h
    restore: true
    accuracy_decimals: 3
